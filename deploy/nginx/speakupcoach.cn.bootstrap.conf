server {
    listen 80;
    listen [::]:80;
    server_name speakupcoach.cn www.speakupcoach.cn app.speakupcoach.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
    }
}
