map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name speakupcoach.cn www.speakupcoach.cn app.speakupcoach.cn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.speakupcoach.cn$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name speakupcoach.cn app.speakupcoach.cn;

    ssl_certificate /etc/letsencrypt/live/speakupcoach.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/speakupcoach.cn/privkey.pem;

    return 301 https://www.speakupcoach.cn$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.speakupcoach.cn;

    ssl_certificate /etc/letsencrypt/live/speakupcoach.cn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/speakupcoach.cn/privkey.pem;

    client_max_body_size 600m;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
    }

    location /ws/ {
        access_log off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_pass http://127.0.0.1:8000;
    }

    location /health {
        proxy_pass http://127.0.0.1:8000;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
    }
}
